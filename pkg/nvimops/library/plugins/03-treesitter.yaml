apiVersion: devopsmaestro.io/v1
kind: NvimPlugin
metadata:
  name: treesitter
  description: "Syntax highlighting, indentation, and incremental selection"
  category: syntax
  tags: ["highlighting", "parsing"]
spec:
  repo: nvim-treesitter/nvim-treesitter
  build: ":TSUpdate"
  config: |
    -- nvim-treesitter configuration
    -- NOTE: Parser installation is handled by the :TSUpdate build hook
    -- DO NOT auto-install parsers here - it causes issues during nvim startup

    -- Enable syntax highlighting via FileType autocmd
    vim.api.nvim_create_autocmd("FileType", {
      pattern = "*",
      callback = function()
        pcall(vim.treesitter.start)
      end,
    })

    -- Enable indentation
    vim.api.nvim_create_autocmd("FileType", {
      pattern = "*",
      callback = function()
        vim.bo.indentexpr = "v:lua.require'nvim-treesitter'.indentexpr()"
      end,
    })

    -- Incremental selection keymaps
    vim.keymap.set("n", "<C-space>", function()
      require("nvim-treesitter.incremental_selection").init_selection()
    end, { desc = "Init treesitter selection" })
    vim.keymap.set("x", "<C-space>", function()
      require("nvim-treesitter.incremental_selection").node_incremental()
    end, { desc = "Increment treesitter selection" })
    vim.keymap.set("x", "<bs>", function()
      require("nvim-treesitter.incremental_selection").node_decremental()
    end, { desc = "Decrement treesitter selection" })

    -- Use bash parser for zsh files
    vim.treesitter.language.register("bash", "zsh")
