apiVersion: devopsmaestro.io/v1
kind: NvimPlugin
metadata:
  name: indent-blankline
  description: "Indentation guides for Neovim"
  category: ui
  tags: ["ui", "indent", "guides"]
spec:
  repo: lukas-reineke/indent-blankline.nvim
  event: ["BufReadPre", "BufNewFile"]
  config: |
    require("ibl").setup({
      indent = { char = "┊" },
    })
