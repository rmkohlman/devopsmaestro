apiVersion: devopsmaestro.io/v1
kind: NvimPlugin
metadata:
  name: treesitter-textobjects
  description: "Treesitter text objects for functions, classes, parameters"
  category: syntax
  tags: ["textobjects", "navigation"]
spec:
  repo: nvim-treesitter/nvim-treesitter-textobjects
  dependencies:
    - nvim-treesitter/nvim-treesitter
  config: |
    -- nvim-treesitter-textobjects setup (compatible with new nvim-treesitter)
    -- Note: textobjects module has its own setup, not via configs
    local ts_textobjects = require("nvim-treesitter-textobjects")

    -- Setup text object selections
    ts_textobjects.setup({
      select = {
        enable = true,
        lookahead = true,
        keymaps = {
          ["aa"] = "@parameter.outer",
          ["ia"] = "@parameter.inner",
          ["af"] = "@function.outer",
          ["if"] = "@function.inner",
          ["ac"] = "@class.outer",
          ["ic"] = "@class.inner",
        },
      },
      move = {
        enable = true,
        set_jumps = true,
        goto_next_start = {
          ["]m"] = "@function.outer",
          ["]]"] = "@class.outer",
        },
        goto_next_end = {
          ["]M"] = "@function.outer",
          ["]["] = "@class.outer",
        },
        goto_previous_start = {
          ["[m"] = "@function.outer",
          ["[["] = "@class.outer",
        },
        goto_previous_end = {
          ["[M"] = "@function.outer",
          ["[]"] = "@class.outer",
        },
      },
      swap = {
        enable = true,
        swap_next = {
          ["<leader>a"] = "@parameter.inner",
        },
        swap_previous = {
          ["<leader>A"] = "@parameter.inner",
        },
      },
    })
