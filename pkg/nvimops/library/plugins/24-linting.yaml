apiVersion: devopsmaestro.io/v1
kind: NvimPlugin
metadata:
  name: linting
  description: "Linting with nvim-lint"
  category: lsp
  tags: ["linting", "lsp"]
spec:
  repo: mfussenegger/nvim-lint
  event: ["BufReadPre", "BufNewFile"]
  config: |
    local lint = require("lint")

    -- Only configure linters that are actually installed
    -- This prevents ENOENT errors when a linter binary is missing
    local linters = {}

    if vim.fn.executable("shellcheck") == 1 then
    	linters.sh = { "shellcheck" }
    	linters.bash = { "shellcheck" }
    	linters.zsh = { "shellcheck" }
    end

    if vim.fn.executable("pylint") == 1 then
    	linters.python = { "pylint" }
    end

    lint.linters_by_ft = linters

    local lint_augroup = vim.api.nvim_create_augroup("lint", { clear = true })

    vim.api.nvim_create_autocmd({ "BufEnter", "BufWritePost", "InsertLeave" }, {
    	group = lint_augroup,
    	callback = function()
    		lint.try_lint()
    	end,
    })

    vim.keymap.set("n", "<leader>l", function()
    	lint.try_lint()
    end, { desc = "Trigger linting for current file" })
