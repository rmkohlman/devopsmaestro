apiVersion: devopsmaestro.io/v1
kind: NvimPlugin
metadata:
  name: venv-selector
  description: "Python virtual environment selector"
  category: language
  tags: ["python", "venv", "virtualenv"]
spec:
  repo: linux-cultist/venv-selector.nvim
  dependencies:
    - repo: nvim-telescope/telescope.nvim
  config: |
    require("venv-selector").setup({
      name = { "venv", ".venv", "env", ".env" },
    })
    vim.keymap.set("n", "<leader>vs", "<cmd>VenvSelect<cr>", { desc = "Select Python venv" })
