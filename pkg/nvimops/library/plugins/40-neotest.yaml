apiVersion: devopsmaestro.io/v1
kind: NvimPlugin
metadata:
  name: neotest
  description: "Test runner framework for Neovim"
  category: testing
  tags: ["test", "neotest", "runner"]
spec:
  repo: nvim-neotest/neotest
  dependencies:
    - repo: nvim-neotest/nvim-nio
    - repo: antoinemadec/FixCursorHold.nvim
  config: |
    local keymap = vim.keymap
    keymap.set("n", "<leader>tt", function() require("neotest").run.run() end, { desc = "Run nearest test" })
    keymap.set("n", "<leader>tf", function() require("neotest").run.run(vim.fn.expand("%")) end, { desc = "Run file tests" })
    keymap.set("n", "<leader>ts", function() require("neotest").summary.toggle() end, { desc = "Toggle test summary" })
    keymap.set("n", "<leader>to", function() require("neotest").output.open({ enter_on_open = true }) end, { desc = "Show test output" })
    keymap.set("n", "<leader>tp", function() require("neotest").output_panel.toggle() end, { desc = "Toggle output panel" })
    keymap.set("n", "<leader>tS", function() require("neotest").run.stop() end, { desc = "Stop test" })
    keymap.set("n", "<leader>td", function() require("neotest").run.run({ strategy = "dap" }) end, { desc = "Debug nearest test" })
