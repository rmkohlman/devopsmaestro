apiVersion: devopsmaestro.io/v1
kind: NvimPlugin
metadata:
  name: mason
  description: "LSP, DAP, linter, and formatter installer"
  category: lsp
  tags: ["lsp", "tooling"]
spec:
  repo: williamboman/mason.nvim
  dependencies:
    - repo: williamboman/mason-lspconfig.nvim
    - repo: WhoIsSethDaniel/mason-tool-installer.nvim
  config: |
    local mason = require("mason")
    local mason_lspconfig = require("mason-lspconfig")
    local mason_tool_installer = require("mason-tool-installer")

    mason.setup({
    	ui = {
    		icons = {
    			package_installed = "✓",
    			package_pending = "➜",
    			package_uninstalled = "✗",
    		},
    	},
    })

    -- LSP servers are installed at build time via MasonInstall (language-aware)
    -- Do NOT add ensure_installed here - it causes failures for missing toolchains
    mason_lspconfig.setup({})

    -- Tools are installed at build time via MasonInstall (language-aware)
    -- Do NOT add ensure_installed here - it causes failures for missing toolchains
    mason_tool_installer.setup({})
