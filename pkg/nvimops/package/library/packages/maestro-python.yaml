apiVersion: devopsmaestro.io/v1
kind: NvimPackage
metadata:
  name: maestro-python
  description: "Maestro IDE for Python — full IDE + debugpy, neotest, venv selector"
  category: language
  tags: ["maestro", "python", "ide", "complete"]
spec:
  extends: maestro
  plugins:
    - nvim-dap
    - nvim-dap-python
    - neotest
    - neotest-python
    - venv-selector
