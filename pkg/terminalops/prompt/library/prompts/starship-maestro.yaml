apiVersion: devopsmaestro.io/v1
kind: TerminalPrompt
metadata:
  name: starship-maestro
  description: Maestro CoolNight Ocean powerline prompt with Kubernetes, Colima, and language detection
  category: personal
  tags:
    - powerline
    - nerdfonts
    - kubernetes
    - colima
    - coolnight
    - personal
spec:
  type: starship
  # Powerline-style format with color transitions
  # Uses coolnight palette: blue gradient theme with light text
  format: |
    [](red)$os$username[](bg:sky fg:red)$kubernetes${custom.kubernetes_version}[](bg:sapphire fg:sky)${custom.colima_profile}[](bg:peach fg:sapphire)$directory[](bg:sky fg:peach)$git_branch$git_status[](fg:sky bg:green)$c$rust$golang$nodejs$php$java$kotlin$haskell$python${custom.db}[](fg:green bg:sapphire)$conda[](fg:sapphire bg:lavender)$time[](fg:lavender)$cmd_duration$line_break$character
  add_newline: true
  palette: coolnight
  palettes:
    coolnight:
      # Text colors - always light and readable
      crust: "#CBE0F0"
      text: "#CBE0F0"
      subtext0: "#CBE0F0"
      subtext1: "#CBE0F0"
      # Background gradient from dark to light blue
      mantle: "#143652"
      base: "#1a4d6b"
      surface0: "#1f5a7a"
      surface1: "#256689"
      surface2: "#2b7298"
      overlay0: "#143652"
      overlay1: "#1a4d6b"
      overlay2: "#1f5a7a"
      # Segment background colors
      red: "#0d2a3d"
      maroon: "#E52E2E"
      peach: "#1f5a7a"
      yellow: "#2b7298"
      green: "#256689"
      teal: "#1f5a7a"
      sky: "#1a4d6b"
      sapphire: "#1f5a7a"
      blue: "#256689"
      lavender: "#2b7298"
      pink: "#256689"
      mauve: "#256689"
      flamingo: "#2b7298"
      rosewater: "#CBE0F0"
  character:
    success_symbol: "[❯](bold fg:green)"
    error_symbol: "[❯](bold fg:red)"
    vicmd_symbol: "[❮](bold fg:green)"
    vicmd_replace_one_symbol: "[❮](bold fg:lavender)"
    vicmd_replace_symbol: "[❮](bold fg:lavender)"
    vicmd_visual_symbol: "[❮](bold fg:yellow)"
  modules:
    os:
      disabled: false
      format: "[$symbol]($style)"
      style: "bg:red fg:crust"
      symbols:
        Macos: " 󰀵 "
        Windows: ""
        Ubuntu: "󰕈"
        SUSE: ""
        Arch: ""
        CentOS: ""
        Debian: "󰣚"
        Redhat: " "
    username:
      format: "[$user]($style)"
      style: "bg:red fg:crust"
      options:
        show_always: true
      aliases:
        rkohlman: "🙎🏻‍♂️"
    directory:
      format: "[$path ]($style)"
      style: "bg:peach fg:crust"
      substitutions:
        Desktop: " "
        Documents: " "
        Downloads: "  "
        Music: "󰝚 "
        Pictures: "  "
        Developer: "  "
        Library: " "
        gitlab: "󰮠"
        github: ""
        bitbucket: ""
    git_branch:
      symbol: " "
      format: "[$symbol$branch$state]($style)"
      style: "bg:sky fg:crust"
      options:
        truncation_length: 4
        truncation_symbol: "…"
    git_status:
      format: "[($conflicted$untracked$modified$staged$renamed$deleted$stashed$ahead_behind)]($style)"
      style: "bg:sky fg:crust"
      options:
        conflicted: "⫯"
        untracked: "?"
        modified: "!"
        staged: "+"
        renamed: "»"
        deleted: "✖"
        stashed: "⍟"
        ahead: "⇡${count}"
        behind: "⇣${count}"
        diverged: "⇕${ahead_count} ${behind_count}"
    kubernetes:
      disabled: false
      symbol: "  "
      format: "[$symbol$context( \\($namespace\\))]($style)"
      style: "bg:sky fg:crust"
      contexts:
        - pattern: "kubernetes-admin@kubernetes"
          alias: "West"
        - pattern: "tanzu-cli-rbeans-lab-north@rbeans-lab-north"
          alias: "East-Lab"
        - pattern: "^colima$"
          alias: "colima"
        - pattern: "^colima-local-(?P<cluster>[\\w-]+)"
          alias: "$cluster"
        - pattern: "^production$"
          alias: "production"
          style: "bold green"
        - pattern: "^staging$"
          alias: "staging"
          style: "bold yellow"
        - pattern: "^dev$"
          alias: "dev"
          style: "bold brown"
        - pattern: "^ci-cd$"
          style: "bold magenta"
    nodejs:
      symbol: ""
      format: "[[ $symbol( $version) ](fg:crust bg:green)]($style)"
      style: "bg:green"
    c:
      symbol: " "
      format: "[[ $symbol( $version) ](fg:crust bg:green)]($style)"
      style: "bg:green"
    rust:
      symbol: ""
      format: "[[ $symbol( $version) ](fg:crust bg:green)]($style)"
      style: "bg:green"
    golang:
      symbol: ""
      format: "[[ $symbol( $version) ](fg:crust bg:green)]($style)"
      style: "bg:green"
    php:
      symbol: ""
      format: "[[ $symbol( $version) ](fg:crust bg:green)]($style)"
      style: "bg:green"
    java:
      symbol: " "
      format: "[[ $symbol( $version) ](fg:crust bg:green)]($style)"
      style: "bg:green"
    kotlin:
      symbol: ""
      format: "[[ $symbol( $version) ](fg:crust bg:green)]($style)"
      style: "bg:green"
    haskell:
      symbol: ""
      format: "[[ $symbol( $version) ](fg:crust bg:green)]($style)"
      style: "bg:green"
    python:
      symbol: ""
      format: "[[ $symbol( $version)(\\(#$virtualenv\\)) ](fg:crust bg:green)]($style)"
      style: "bg:green"
    conda:
      symbol: " "
      format: "[$symbol$environment ]($style)"
      style: "fg:crust bg:sapphire"
      options:
        ignore_base: false
    time:
      disabled: false
      format: "[[  $time ](fg:crust bg:lavender)]($style)"
      style: "bg:lavender"
      options:
        time_format: "%R"
    cmd_duration:
      format: "[  $duration]($style)"
      style: "fg:subtext0"
      options:
        show_milliseconds: true
        show_notifications: true
        min_time_to_notify: 45000
    docker_context:
      symbol: ""
      format: "[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)"
      style: "bg:sapphire fg:sky"
      disabled: true
  custom:
    kubernetes_version:
      command: "timeout 0.15 kubectl version --request-timeout=1s -o json 2>/dev/null | jq -r '.serverVersion.gitVersion'"
      when: true
      format: "[ $output ](fg:crust bg:sky)"
    colima_profile:
      command: "timeout 0.15 awk -F'-' '{print $2}' $HOME/.colima_active_profile"
      when: "timeout 0.15 kubectl config current-context | grep -q 'colima' && echo true || echo false"
      format: "[  $output ](fg:crust bg:sapphire)"
    db:
      symbol: "󰆼"
      detect_extensions:
        - sql
        - ddl
        - dml
        - mdf
        - ndf
        - ldf
        - db
        - sqlite
        - sqlite3
        - mdb
        - accdb
        - frm
        - myd
        - myi
        - ibd
        - dbf
        - gdb
        - fdb
        - udl
        - pks
        - pkb
        - pls
        - trg
      format: "[[ $symbol( $version)(\\(#$virtualenv\\)) ](fg:crust bg:green)]($style)"
