apiVersion: devopsmaestro.io/v1
kind: PromptExtension
metadata:
  name: colima
  description: Colima profile display for local Kubernetes
  category: infrastructure
  tags:
    - colima
    - docker
    - container
spec:
  segment: colima
  provides:
    - custom.colima_profile
  modules:
    custom.colima_profile:
      command: "timeout 0.15 awk -F'-' '{print $2}' $HOME/.colima_active_profile"
      when: "timeout 0.15 kubectl config current-context | grep -q 'colima' && echo true || echo false"
      format: "[  $output ](fg:crust bg:sapphire)"
