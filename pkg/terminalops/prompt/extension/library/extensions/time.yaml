apiVersion: devopsmaestro.io/v1
kind: PromptExtension
metadata:
  name: time
  description: Time and command duration display
  category: system
  tags:
    - time
    - duration
    - clock
spec:
  segment: time
  provides:
    - time
    - cmd_duration
  modules:
    time:
      disabled: false
      style: "bg:lavender"
      format: "[[  $time ](fg:crust bg:lavender)]($style)"
      options:
        time_format: "%R"
    cmd_duration:
      disabled: false
      style: "fg:subtext0"
      format: "[  $duration]($style)"
      options:
        show_milliseconds: true
        show_notifications: true
        min_time_to_notify: 45000
