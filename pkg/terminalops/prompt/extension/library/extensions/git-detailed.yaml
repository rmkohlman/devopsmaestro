apiVersion: devopsmaestro.io/v1
kind: PromptExtension
metadata:
  name: git-detailed
  description: Detailed git branch and status display
  category: vcs
  tags:
    - git
    - branch
    - status
spec:
  segment: git
  provides:
    - git_branch
    - git_status
  modules:
    git_branch:
      symbol: " "
      format: "[$symbol$branch$state]($style)"
      style: "bg:sky fg:crust"
      options:
        truncation_length: 4
        truncation_symbol: "…"
    git_status:
      style: "bg:sky fg:crust"
      format: "[($conflicted$untracked$modified$staged$renamed$deleted$stashed$ahead_behind)]($style)"
      options:
        conflicted: "⫯"
        untracked: "?"
        modified: "!"
        staged: "+"
        renamed: "»"
        deleted: "✖"
        stashed: "⍟"
        ahead: "⇡${count}"
        behind: "⇣${count}"
        diverged: "⇕${ahead_count} ${behind_count}"
