apiVersion: devopsmaestro.io/v1
kind: PromptExtension
metadata:
  name: conda
  description: Conda environment display
  category: development
  tags:
    - conda
    - python
    - environment
spec:
  segment: conda
  provides:
    - conda
  modules:
    conda:
      symbol: " "
      style: "fg:crust bg:sapphire"
      format: "[$symbol$environment ]($style)"
      options:
        ignore_base: false
