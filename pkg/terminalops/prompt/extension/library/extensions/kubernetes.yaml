apiVersion: devopsmaestro.io/v1
kind: PromptExtension
metadata:
  name: kubernetes
  description: Kubernetes context and version display
  category: infrastructure
  tags:
    - kubernetes
    - k8s
    - context
spec:
  segment: kubernetes
  provides:
    - kubernetes
    - custom.kubernetes_version
  modules:
    kubernetes:
      disabled: false
      symbol: "  "
      style: "bg:sky fg:crust"
      format: "[$symbol$context( \\($namespace\\))]($style)"
      options:
        contexts:
          - context_pattern: "kubernetes-admin@kubernetes"
            context_alias: "West"
          - context_pattern: "tanzu-cli-rbeans-lab-north@rbeans-lab-north"
            context_alias: "East-Lab"
          - context_pattern: "^colima$"
            context_alias: "colima"
          - context_pattern: "^colima-local-(?P<cluster>[\\w-]+)"
            context_alias: "$cluster"
          - context_pattern: "^production$"
            context_alias: "production"
            style: "bold green"
          - context_pattern: "^staging$"
            context_alias: "staging"
            style: "bold yellow"
          - context_pattern: "^dev$"
            context_alias: "dev"
            style: "bold brown"
          - context_pattern: "^ci-cd$"
            style: "bold magenta"
    custom.kubernetes_version:
      command: "timeout 0.15 kubectl version --request-timeout=1s -o json 2>/dev/null | jq -r '.serverVersion.gitVersion'"
      when: true
      format: "[ $output ](fg:crust bg:sky)"
