apiVersion: devopsmaestro.io/v1
kind: TerminalPackage
metadata:
  name: maestro
  description: "Maestro terminal configuration with CoolNight Ocean theme"
  category: personal
  tags:
    - personal
    - zsh
    - starship
    - wezterm
    - coolnight
  labels:
    theme: coolnight-ocean
spec:
  promptStyle: powerline-segments
  promptExtensions:
    - identity
    - kubernetes
    - colima
    - path
    - git-detailed
    - languages-all
    - conda
    - time
    - character
  plugins:
    - zsh-autosuggestions
    - zsh-syntax-highlighting
    - zsh-completions
    - fzf
  profiles:
    - tmux-style
  wezterm:
    fontSize: 14
    fontFamily: "Cascadia Code PL"