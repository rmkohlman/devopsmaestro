site_name: DevOpsMaestro
site_url: https://rmkohlman.github.io/devopsmaestro/
site_description: kubectl-style CLI toolkit for containerized development environments
site_author: Robert Kohlman
repo_name: rmkohlman/devopsmaestro
repo_url: https://github.com/rmkohlman/devopsmaestro

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags
  - redirects:
      redirect_maps:
        'nvp/overview.md': 'https://rmkohlman.github.io/MaestroNvim/plugins/overview/'
        'nvp/plugins.md': 'https://rmkohlman.github.io/MaestroNvim/plugins/library/'
        'nvp/packages.md': 'https://rmkohlman.github.io/MaestroNvim/plugins/packages/'
        'nvp/themes.md': 'https://rmkohlman.github.io/MaestroNvim/themes/overview/'
        'nvp/quick-start-themes.md': 'https://rmkohlman.github.io/MaestroNvim/themes/quickstart/'
        'nvp/coolnight.md': 'https://rmkohlman.github.io/MaestroNvim/themes/coolnight/'
        'nvp/opencode.md': 'https://rmkohlman.github.io/MaestroNvim/plugins/opencode/'
        'nvp/commands.md': 'https://rmkohlman.github.io/MaestroNvim/commands/'
        'dvt/commands.md': 'https://rmkohlman.github.io/MaestroTerminal/commands/'
        'configuration/plugin-system.md': 'https://rmkohlman.github.io/MaestroNvim/configuration/plugin-system/'
        'configuration/wezterm.md': 'https://rmkohlman.github.io/MaestroTerminal/terminal/wezterm/'
        'configuration/terminal-prompt.md': 'https://rmkohlman.github.io/MaestroTerminal/prompts/overview/'
        'reference/nvim-plugin.md': 'https://rmkohlman.github.io/MaestroNvim/reference/nvim-plugin/'
        'reference/nvim-theme.md': 'https://rmkohlman.github.io/MaestroNvim/reference/nvim-theme/'
        'reference/nvim-package.md': 'https://rmkohlman.github.io/MaestroNvim/reference/nvim-package/'
        'reference/terminal-plugin.md': 'https://rmkohlman.github.io/MaestroTerminal/reference/terminal-plugin/'
        'reference/terminal-package.md': 'https://rmkohlman.github.io/MaestroTerminal/reference/terminal-package/'
        'reference/terminal-prompt.md': 'https://rmkohlman.github.io/MaestroTerminal/reference/terminal-prompt/'
        'reference/wezterm-config.md': 'https://rmkohlman.github.io/MaestroTerminal/reference/wezterm-config/'
        'advanced/theme-hierarchy.md': 'https://rmkohlman.github.io/MaestroTheme/configuration/theme-hierarchy/'
        'colorprovider-integration.md': 'configuration/cli-colors.md'

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rmkohlman/devopsmaestro
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Existing Projects: getting-started/existing-projects.md
    - New Projects: getting-started/new-projects.md
  - dvm (DevOpsMaestro):
    - Overview: dvm/overview.md
    - Apps: dvm/apps.md
    - Workspaces: dvm/workspaces.md
    - Building & Attaching: dvm/build-attach.md
    - opencode CLI Tool: dvm/opencode.md
    - Commands Reference: dvm/commands.md
  - Configuration:
    - YAML Schema: configuration/yaml-schema.md
    - Shell Completion: configuration/shell-completion.md
    - CLI Colors: configuration/cli-colors.md
  - Reference:
    - YAML Templates: reference/yaml-templates.md
    - Overview: reference/index.md
    - Ecosystem: reference/ecosystem.md
    - Domain: reference/domain.md
    - App: reference/app.md
    - Workspace: reference/workspace.md
    - Credential: reference/credential.md
    - Registry: reference/registry.md
    - GitRepo: reference/gitrepo.md
    - GlobalDefaults: reference/global-defaults.md
    - CustomResourceDefinition: reference/custom-resource-definition.md
  - Advanced:
    - Current Architecture: advanced/architecture.md
    - Theme Infrastructure as Code: advanced/theme-iac.md
    - Source Types: advanced/source-types.md
    - Private Repos: advanced/private-repos.md
  - Development:
    - Architecture Decisions: development/decisions.md
  - Ecosystem Tools:
    - 'nvp (NvimOps)': https://rmkohlman.github.io/MaestroNvim/
    - 'dvt (Terminal)': https://rmkohlman.github.io/MaestroTerminal/
    - 'MaestroTheme': https://rmkohlman.github.io/MaestroTheme/
  - Changelog: changelog.md
